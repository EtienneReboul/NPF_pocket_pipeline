# =============================================================================
# NPF Family Structure Modelling Pipeline — Master Configuration
# =============================================================================
# Covers all stages:
#   1. MSA         — UniProt → ColabFold MSA per NPF member
#   2. InterProScan — EMBL-EBI REST → CDD binding-site residues per protein
#   3. Templates   — RCSB mmCIF download per conformation set
#   4. Boltz-2     — structure prediction (protein × conformation)
#   5. Minimize    — ChimeraX energy minimization, CIF → PDB
#   6. PLIP        — protein-ligand interaction profiling via Docker
#   7. pliparser   — PLIP report → CSV + ChimeraX .cxc visualisation

# ── Stage 1: UniProt + ColabFold MSA ─────────────────────────────────────────
uniprot:
  query: 'reviewed:true AND organism_id:3702 AND protein_name:"NRT1/ PTR FAMILY"'
  size: 500                        # max sequences to retrieve

colabfold:
  delay: 8                         # seconds between submissions (rate limit)
  max_retries: 3
  poll_interval: 15                # seconds between status polls
  poll_timeout: 300                # seconds before job times out

# ── Stage 2: InterProScan (EMBL-EBI REST) ────────────────────────────────────
interproscan:
  email: "your@email.com"          # required by EBI REST API
  applications: "CDD"              # run CDD database only
  poll_interval: 30                # seconds between status polls
  poll_timeout: 3600               # 1 hour timeout for batch job
  # CDD subclade accessions for NPF family.
  # Each protein will be assigned the one cd174xx found in its result.
  cdd_accessions:
    - "cd17351"   # MFS_NPF     (root / unclassified)
    - "cd17413"   # MFS_NPF6
    - "cd17414"   # MFS_NPF4
    - "cd17415"   # MFS_NPF3
    - "cd17416"   # MFS_NPF1_2
    - "cd17417"   # MFS_NPF5
    - "cd17418"   # MFS_NPF8
    - "cd17419"   # MFS_NPF7

# ── Stage 3: Template download ────────────────────────────────────────────────
templates:
  efflux: false                    # set true to merge MFS-MDR efflux pump templates
  # Conformations and their PDB codes.
  # Folder names containing "holo" → ligand included in Boltz-2 YAML.
  # Folder names containing "apo"  → protein only.
  conformations:
    outward_open_apo:
      pdb_codes: ["9UI1"]                   # A — GTR1 outward-apo (Yan 2026), primary anchor
      consider:  ["7PN1"]                   # B — HsPepT1 outward-open (POT)
      fallback:  ["4YBQ", "3O7Q"]           # D — GLUT5 / FucP, per-bundle align

    outward_occluded_holo:
      models:    ["GTR1_out-occluded_repeat-swap"]   # no native NPF/POT exists yet
      fallback:  ["4GBY", "4ZW9"]           # D — XylE / GLUT3 outward-occluded

    occluded_apo:
      models:    ["GTR1_occluded-apo_repeat-swap"]   # genuinely thin bin
      # consider: NarK occluded (nitrate transporter) — add code when identified

    occluded_holo:
      pdb_codes: ["2XUT", "6RW3"]           # B (PepTSo occluded) + D (PfHT1 fully occluded)
      # consider: NarK occluded — for nitrate-clade targets

    inward_occluded_holo:
      pdb_codes: ["2XUT", "4IKZ"]           # B — PepTSo / GkPOT+alafosfalin
      consider:  ["9UIF", "9UIT"]           # A — GTR1 ligand-bound inward

    inward_open_apo:
      pdb_codes: ["9UI6", "4OH3", "7S8U"]   # A (GTR1) + A (NRT1.1) + B (HsPepT1)
      consider:  ["23DA", "4UVM", "4IKV"]   # A (AtGTR1 Nan 2026) + B (PepTSo / GkPOT inward)

# ── Stage 4: Boltz-2 ─────────────────────────────────────────────────────────
boltz:
  # Ligand SMILES — used for all "holo" conformations
  ligand_smiles: "OC([C@H]1[C@@]2([H])[C@]3(OC([C@@]2([C@H](CC3)O)C)=O)[C@@]4([H])[C@]15C[C@@](CC4)(C(C5)=C)O)=O"  # Gibberellin A1 (GA1)
  ligand_entity_id: "L"
  protein_entity_id: "A"
  recycling_steps: 3
  diffusion_samples: 5
  output_format: "mmcif"
  no_kernels: true                 # required for CPU / sm_70 (V100S)
  # Pocket constraint settings (fed from CDD binding-site residues)
  pocket_max_distance: 6.0         # Angstroms (4–20 supported)
  pocket_force: true               # apply steering potential to enforce constraint
  # Accelerator: "cpu" for local Mac, "gpu" for HPC
  accelerator: "gpu"    # was "cpu"
  extra_flags: ""

# ── Stage 5: ChimeraX minimization ───────────────────────────────────────────
# Full path to ChimeraX should be set in config.local.yaml
chimerax_bin: "/path/to/ChimeraX"

# ── Stage 6: PLIP ────────────────────────────────────────────────────────────
plip:
  image: "docker.io/pharmai/plip:latest"
  docker_memory: "16g"
  docker_platform: "linux/amd64"   # needed on Apple Silicon; leave "" for native
  receptor_chain: "A"
  ligand_chain: "L"

# ── Stage 7: pliparser / ChimeraX visualisation ──────────────────────────────
visualization:
  transparency: 65
  receptor_color: "gray"
  ligand_color: "green"

# ── Stage 10: TM helix annotation (Phobius + TMHMM via InterProScan REST) ────
# Identifies which residue ranges correspond to TM1–TM12 in each NPF sequence.
# TM2 (index 1) and TM8 (index 7) are used as the conformational angle metric.
# Reference: Qureshi et al. (2020) Nature https://doi.org/10.1038/s41586-020-1963-z
tm_annotation:
  email: "your@email.com"          # required by EBI REST API
  poll_interval: 30
  poll_timeout: 3600

# ── Stage 11–12: TM2/TM8 angle + GMM conformation classification ─────────────
tm_angle:
  min_helix_frac: 0.5              # min fraction of TM region helical in DSSP sanity check

gmm:
  n_init: 20                       # GMM restarts for robust convergence

# ── Output directories ────────────────────────────────────────────────────────
dirs:
  fasta:      "data/sequences"            # UniProt FASTA + per-protein FASTA
  msa:        "data/msa"                  # ColabFold outputs (a3m / m8 / sh)
  interpro:   "data/interpro"             # InterProScan JSON + binding-site TXT
  templates:  "data/templates"            # mmCIF template files per conformation
  boltz_in:   "data/boltz_inputs"         # generated Boltz-2 YAML inputs
  boltz_out:  "results/boltz"             # Boltz-2 mmCIF outputs
  minimized:  "results/minimized"         # ChimeraX PDB outputs
  plip:       "results/plip"              # PLIP reports + CSVs + CXC scripts
  dssp:       "results/dssp"              # ChimeraX DSSP JSON per sample
  tm_angles:  "results/tm_angles"         # TM2/TM8 angle CSVs per sample + conformation
  gmm:        "results/gmm"               # GMM report, plots, BIC comparison
  reannotated: "results/reannotated"     # CIF symlinks reorganised by GMM conformation
  logs:       "logs"
