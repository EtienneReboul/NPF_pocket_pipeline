name: boltz2
# Boltz-2 compute environment.
#
# cuequivariance packages (PyPI only, not on conda-forge) enable triangular
# multiplication kernels on CUDA GPUs (A100, L40S, H100). They are optional:
# if absent, run boltz with --no_kernels (slower but correct).
#
# cu12 suffix targets CUDA 12.x — change to cu11 if cluster runs CUDA 11.x.
# Check with: python -c "import torch; print(torch.version.cuda)"
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.12
  - pip
  - pip:
      - boltz
      - "numpy>=1.26,<2.0"
      - pyyaml>=6.0
      - cuequivariance-torch            # optional GPU kernel acceleration
      - cuequivariance-ops-torch-cu12   # change cu12→cu11 for CUDA 11.x