name: esmfold2
# ESMFold2-Fast compute environment.
#
# ESMFold2 (Biohub) uses a custom transformers fork installed as a transitive
# dependency of the esm package — no separate transformers install needed.
#
# rdkit is installed via conda-forge (more reliable than the PyPI wheel and
# avoids binary compatibility issues on HPC nodes).
#
# PyTorch CUDA: the esm package pins torch>=2.2.0 without a CUDA build tag,
# so we install the CUDA-enabled wheel explicitly before esm to avoid getting
# the CPU-only build. Adjust cu130 → cu128 / cu126 to match your cluster's
# CUDA driver (check with: nvidia-smi | grep "CUDA Version").
#
# xformers must match the exact (PyTorch, CUDA) ABI — wheels live on the
# PyTorch index and are resolved automatically when the same --extra-index-url
# is set and torch is already pinned above.
#
# flash-attn provides the faster RoPE kernel used by esm's ESMC.
# transformer-engine provides fused fp32-reduction LayerNorm used by ESMC.
# Both are installed AFTER torch so the build/wheel selection can see the
# installed torch version.
#
# Python 3.12 is required strictly (esm pyproject: >=3.12,<3.13).
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.12
  - rdkit>=2023.9       # binary rdkit — more reliable via conda-forge than pip
  - pip
  - pip:
      # Install CUDA-enabled torch BEFORE esm so pip does not pull the CPU wheel.
      # Change cu130 to match your cluster's CUDA version (cu126, cu128, …).
      - --extra-index-url https://download.pytorch.org/whl/cu130
      - "torch>=2.2.0"
      - xformers            # must match torch ABI — resolved via the index above
      - "esm @ git+https://github.com/Biohub/esm.git@main"
      - pyyaml>=6.0         # used by the SLURM batch runner to parse target.yaml
      - flash-attn          # faster RoPE kernel for ESMC (pre-built wheels on PyPI)
      - "transformer-engine[pytorch]"  # fused LayerNorm for ESMC
